<!DOCTYPE html>
<html>
<head>
  <title>Jet Lag IRL</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>
<body>

<div id="menu" style="position: absolute; bottom: 10px; left: 10px;">
  <input id="nameInput" placeholder="Enter name">
  <button onclick="createProfile()">Create Profile</button>

  <input id="gameIdInput" placeholder="Game ID">
  <button onclick="createGameFromInput()">Create Game</button>
  <button onclick="joinGame()">Join Game</button>
</div>

<!-- Screens -->
<div id="homeScreen"></div>

<div id="waitingScreen" style="text-align:center;">
  <h2>Waiting for host...</h2>
</div>

<div id="hostScreen" style="text-align:center;">
  <h2>Lobby: Select Hider</h2>
  <div>
    Hide Time (seconds): <input id="hideTimeInput" type="number" value="30" min="1">
  </div>
  <div id="hostPlayerList"></div>
  <button id="startGameBtn" style="display:none;" onclick="startGameRound()">Start Game</button>
</div>

<div id="hiderScreen">
  <h2>You are the Hider!</h2>
  <div>Hide time remaining: <span id="hideTimerHider">0</span>s</div>
</div>

<div id="seekerScreen">
  <h2>You are a Seeker</h2>
  <div>Hide time remaining: <span id="hideTimerSeeker">0</span>s</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="api.js"></script>
<script src="state.js"></script>
<script src="map.js"></script>
<script src="app.js"></script>

</body>
</html>
